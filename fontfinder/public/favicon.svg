<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d9ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Letter A — bold, centered -->
  <text
    x="32"
    y="46"
    font-family="Georgia, serif"
    font-size="38"
    font-weight="700"
    text-anchor="middle"
    fill="white"
    letter-spacing="-1"
  >A</text>
  <!-- Small magnifying glass dot — bottom right -->
  <circle cx="50" cy="50" r="7" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
  <line x1="55" y1="55" x2="60" y2="60" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
